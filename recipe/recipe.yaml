context:
  version: "0.15.0"

package:
  name: zenith
  version: ${{ version }}

source:
  url: https://github.com/bvaisvil/zenith/archive/${{ version }}.tar.gz
  sha256: f92ed87b66f97b1f6c5863a62cc795ec877510dcd0284fba822ef5dc091b9355

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - libclang

tests:
  - script:
      - zenith --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: In terminal graphical metrics for your *nix system
  homepage: https://github.com/bvaisvil/zenith
  repository: https://github.com/bvaisvil/zenith

extra:
  recipe-maintainers:
    - danielnachun
